<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#11131a">
  <title>Drift & Touch</title>
  <link rel="stylesheet" href="styles.css?v=game-score2">
</head>
<body>
  <main id="game" aria-label="Drift and Touch game">
    <header class="hud">
      <div class="scores">
        <div>
          <span id="score-label" class="eyebrow">SCORE</span>
          <strong id="score" aria-live="polite">0</strong>
        </div>
        <div class="best-score">
          <span class="eyebrow">BEST</span>
          <strong id="best">0</strong>
        </div>
      </div>
      <div class="all-time-score" aria-label="Highest human score recorded by this server">
        <span class="eyebrow">WORLD REC</span>
        <strong id="all-time-best">0</strong>
      </div>
      <div class="rule-legend" aria-label="Teal pieces add one point; red pieces add zero points">
        <span><i class="legend-dot good-dot"></i><b>+1</b></span>
        <span><i class="legend-dot bad-dot"></i><b>0</b></span>
      </div>
      <div class="hud-actions">
        <span class="mode-label">Mode</span>
        <button id="pieces-mode" type="button" aria-label="Switch to photo pieces" title="Plain aqua pieces">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="7"/></svg>
        </button>
        <button id="cat-mode" type="button" aria-label="Enable Cat Mode" aria-pressed="false" title="Cat Mode">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="7" cy="8" r="2.1"/><circle cx="12" cy="6.2" r="2.1"/><circle cx="17" cy="8" r="2.1"/>
            <path d="M6.8 15.1c0-3 2.3-5.2 5.2-5.2s5.2 2.2 5.2 5.2c0 2-1.4 3.3-3.2 3.3-.8 0-1.4-.3-2-.8-.6.5-1.2.8-2 .8-1.8 0-3.2-1.3-3.2-3.3Z"/>
          </svg>
        </button>
        <button id="pause" type="button" aria-label="Pause game">&#8545;</button>
      </div>
    </header>

    <section id="field" aria-label="Play field">
      <div class="grid-glow"></div>
      <div id="floaters" aria-hidden="true"></div>
    </section>

  </main>
  <script src="game.js?v=game-score2"></script>
</body>
</html>
